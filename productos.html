<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Productos - HIOMEY</title>

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

    <!-- HEADER -->
  <header class="contenedor-header">

    <div class="header">
      <!-- IZQUIERDA: LOGO -->
      <a href="index.html" class="header__logo-link">
        <span class="header__brand">HIOMEY</span>
      </a>

      <!-- CENTRO: BOTÓN MENÚ HAMBURGUESA (solo móvil) -->
      <button class="header__menu-toggle" id="btnMenuToggle" aria-label="Abrir menú de navegación">
        ☰
      </button>

      <!-- CENTRO: NAV (solo escritorio) -->
      <nav class="header__nav-desktop" id="mainNavDesktop">
        <a href="productos.html">Productos</a>
        <a href="nosotros.html">Nosotros</a>
        <a href="contacto.html">Contacto</a>
      </nav>

      <!-- DERECHA: CARRITO -->
      <button class="header__cart-btn" id="btnCartToggle">
        🛒 <span id="cartCount">0</span>
      </button>

      <!-- DESPLEGABLE MOBILE -->
      <nav class="header__nav-mobile" id="mainNavMobile">
        <a href="productos.html">Productos</a>
        <a href="index.html#nosotros">Nosotros</a>
        <a href="contacto.html">Contacto</a>
      </nav>
    </div>


  </header>

  <!-- MAIN: PÁGINA DE PRODUCTOS -->
  <main class="main products-page">
    <section class="products products-page__section">
      <h1>Todos los productos</h1>
      <p>Explora todo nuestro catálogo disponible actualmente.</p>

      <div class="products__grid" id="productsGrid">

        <!-- PRODUCTO 1 -->


        <!-- PRODUCTO 2 -->


        <!-- PRODUCTO 3 -->



        <!-- PRODUCTO 4 -->


        <!-- PRODUCTO 5 -->


        <!-- PRODUCTO 6 -->


        <!-- PRODUCTO 7 -->


        <!-- PRODUCTO 8 -->


        <!-- PRODUCTO 9 -->


      </div>
    </section>
  </main>

  <!-- CARRITO (SIDEBAR) -->
  <aside class="cart" id="cart">
    <div class="cart__header">
      <h2>Carrito de compras</h2>
      <button id="btnCartClose" class="cart__close">✕</button>
    </div>

    <div class="cart__items" id="cartItems">
      <!-- Items del carrito se inyectan con JS -->
    </div>

    <div class="cart__footer">
      <div class="cart__total">
        Total: S/ <span id="cartTotal">0.00</span>
      </div>
      <button class="btn-primary cart__checkout">Finalizar compra</button>
      <button id="vaciarCarrito" class="btn-secondary">Vaciar carrito</button>
    </div>
  </aside>

  <!-- OVERLAY COMPARTIDO -->
  <div class="overlay" id="overlay"></div>

  <!-- FOOTER -->
  <footer class="footer">
    <p>© <span id="yearSpan"></span> NEXORYS. Todos los derechos reservados.</p>
  </footer>

  <!-- JS -->
  <script src="js/app.js"></script>
  <script>
    // Para mantener el año actualizado en el footer
    document.getElementById("yearSpan").textContent = new Date().getFullYear();
  </script>

  <div id="toast" class="toast"></div>

</body>
</html>
